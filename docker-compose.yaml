x-airflow-common: &airflow-common
  image: apache/airflow:2.9.1-python3.12
  env_file:
    - .env
  extra_hosts:
    - "host.docker.internal:host-gateway"
  environment:
    AIRFLOW__CORE__EXECUTOR: CeleryExecutor
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CELERY__BROKER_URL: redis://redis:6379/0
    AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://airflow:airflow@postgres/airflow
    AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW__API_AUTH__JWT_SECRET}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'false'   # ← DAGs start unpaused
    MYSQL_HOST_SOURCE: ${MYSQL_HOST_SOURCE}
    MYSQL_PORT_SOURCE: ${MYSQL_PORT_SOURCE}
    MYSQL_USER_SOURCE: ${MYSQL_USER_SOURCE}
    MYSQL_PASSWORD_SOURCE: ${MYSQL_PASSWORD_SOURCE}
    MYSQL_BRONZE_DB: ${MYSQL_BRONZE_DB}

      # DESTINATION (GOLD)
    MYSQL_HOST_DESTINATION: ${MYSQL_HOST_DESTINATION}
    MYSQL_PORT_DESTINATION: ${MYSQL_PORT_DESTINATION}
    MYSQL_USER_DESTINATION: ${MYSQL_USER_DESTINATION}
    MYSQL_PASSWORD_DESTINATION: ${MYSQL_PASSWORD_DESTINATION}
    MYSQL_GOLD_DB: ${MYSQL_GOLD_DB}
    _PIP_ADDITIONAL_REQUIREMENTS: "kafka-python mysql-connector-python python-dotenv"  # ← added python-dotenv
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins


services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  kafka-ui:
    image: provectuslabs/kafka-ui
    ports:
      - "8085:8080"
    depends_on:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092

  connect:
    image: quay.io/debezium/connect:latest
    ports:
      - "8083:8083"
    depends_on:
      - kafka
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      GROUP_ID: 1
      CONFIG_STORAGE_TOPIC: connect_configs
      OFFSET_STORAGE_TOPIC: connect_offsets
      STATUS_STORAGE_TOPIC: connect_statuses
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow

  redis:
    image: redis:7

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username ${AIRFLOW_USER} \
          --password ${AIRFLOW_PASSWORD} \
          --firstname Admin \
          --lastname Admin \
          --role Admin \
          --email admin@admin.com

  airflow-apiserver:
    <<: *airflow-common
    ports:
      - "8081:8080"
    command: webserver
    depends_on:
      - airflow-init

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      - airflow-init

  airflow-worker:
    <<: *airflow-common
    command: celery worker
    depends_on:
      - airflow-init

  airflow-triggerer:
    <<: *airflow-common
    command: triggerer
    depends_on:
      - airflow-init

  cdc-listener:
    build: ./listener
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - kafka
      - connect
      - airflow-apiserver
